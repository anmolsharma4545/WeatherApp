<!DOCTYPE html>
<html>
<head>
	<title>Weather App</title>
	<link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
	
	<div class="wrapper">
	
	<div class="input">
		<input type="text" name="" class="inputvalue" placeholder="Type City Name to Search" autocomplete="on">
		<a class="button" href="#">
		<i class="fas fa-search"></i>
		</a>
	</div>

	<div class="temperature">

			<h2 class="temperature-degree">34</h2>&deg;

		</div>
		<div class="temperature-description">It`s Cold.</div>
	</div>
<footer>

	</div>
