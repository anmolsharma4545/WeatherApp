<!DOCTYPE html>
<html>
<head>
	<title>Weather App</title>
	<!--External Style-sheet-->
	<link rel="stylesheet" type="text/css" href="style.css">
	<!--Import Google Icon Font-->
	<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
	<!-- Compiled and minified CSS -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
</head>
<body class="pink lighten-4 white-text">
		<nav>
			<div class="nav-wrapper center-align">
				<a href="#" class="brand-logo ">Weather_App</a>
				<ul id="nav-mobile" class="right hide-on-med-and-down">
				</ul>
			</div>
		</nav>
		<div class="container amber lighten-4 center-align ">
				<div class=" section center-align row ">
					<div class="input-field col s12  ">
						<input id="text" type="text" class="validate inputvalue col s11">
						<label for="text">Enter City:</label>
						<a class="btn-floating btn-large waves-effect waves-light teal button col  "><i class="material-icons">search</i></a>
					</div>
				</div>
				<div class="section col brown lighten-4 card-panel">
					<img src="" alt="icon" class="icon waves-circle responsive-img btn-floating btn-large disabled waves-effect waves-light ">
					<h2 class="location">New York, US</h2>
				</div>
				
			

			
				<div class="section col blue lighten-4 card-panel">
					<h2 class="temperature-degree col s2 ">34</h2>
					<div class="temperature-description col s3">It`s Cold.</div>
				</div>
				
			


		</div>
<footer class="page-footer" >
	<div class="footer-copyright">
		<div class="container">
			<h6>Design and Copyright &copy; WeatherApp</h6>
		<a class="grey-text text-lighten-4 right" href="#!">Anmol Sharma</a>
		</div>
	  </div>
</footer>
</body>
<script src="App.js"></script>
	<!-- Compiled and minified JavaScript -->
	 <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>


</html>
